<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Dimension</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: #fff;
}

/* NAVBAR */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  position: fixed;
  width: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

.nav a {
  color: #aaa;
  text-decoration: none;
  margin-left: 25px;
  font-size: 14px;
}

.nav a:hover {
  color: #fff;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 64px;
  font-weight: 600;
  margin: 0;
}

.hero p {
  font-size: 20px;
  color: #888;
  margin-top: 15px;
}

/* BUTTON */
.btn {
  margin-top: 30px;
  padding: 14px 28px;
  border-radius: 999px;
  background: #fff;
  color: #000;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

.btn:hover {
  background: #ccc;
}

/* IMAGE SECTION */
.section {
  padding: 100px 20px;
  text-align: center;
}

.section img {
  width: 85%;
  max-width: 1200px;
  border-radius: 20px;
  margin-top: 40px;
}

/* FEATURE TEXT */
.big-text {
  font-size: 42px;
  font-weight: 600;
}

.small-text {
  color: #aaa;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div><b>Apex Dimension</b></div>
  <div>
    <a href="#">Home</a>
    <a href="#">Robot</a>
    <a href="#">Team</a>
    <a href="#">Sponsors</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Engineered to Win</h1>
  <p>FRC Team 11211 • Apex Dimension</p>
  <a href="#" class="btn">Explore</a>
</div>

<!-- ROBOT SECTION -->
<div class="section">
  <div class="big-text">Precision. Speed. Control.</div>
  <div class="small-text">Built for high-performance competition.</div>
  <img src="https://via.placeholder.com/1200x600">
</div>

<!-- TEAM SECTION -->
<div class="section">
  <div class="big-text">One Team. One Vision.</div>
  <div class="small-text">Driven by innovation and engineering.</div>
  <img src="https://via.placeholder.com/1200x600">
</div>

</body>
</html>
